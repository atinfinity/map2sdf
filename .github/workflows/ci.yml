name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  colcon-test:
    runs-on: ubuntu-latest
    container: ros:jazzy-ros-base
    steps:
      - uses: actions/checkout@v4
        with:
          path: src/map2sdf

      - name: Install dependencies
        run: |
          apt-get update
          rosdep update
          rosdep install --from-paths src --ignore-src -y

      - name: Build
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --packages-select map2sdf

      - name: Test
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon test --packages-select map2sdf --event-handlers console_direct+
          colcon test-result --verbose
